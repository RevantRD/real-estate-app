<template>

    <lightning-card title="Properties">

        <div class="slds-p-around_medium">

            <div class="slds-grid slds-gutters">

                <div class="slds-col">
                    <lightning-combobox
                        label="Availability Status"
                        value={statusFilter}
                        options={statusOptions}
                        onchange={handleStatusChange}>
                    </lightning-combobox>
                </div>

                <div class="slds-col">
                    <lightning-combobox
                        label="Furnishing Status"
                        value={furnishingFilter}
                        options={furnishingOptions}
                        onchange={handleFurnishingChange}>
                    </lightning-combobox>
                </div>

                <div class="slds-col">
                    <lightning-input
                        type="number"
                        label="Max Price"
                        value={maxPrice}
                        min="0"
                        step="0.01"
                        onchange={handlePriceChange}>
                    </lightning-input>
                </div>

                <div class="slds-col">
                    <lightning-input
                        type="number"
                        label="Distance (KM)"
                        value={distanceKm}
                        min="0"
                        step="0.1"
                        onchange={handleDistanceChange}>
                    </lightning-input>
                </div>

            </div>

        </div>

        <div class="slds-p-around_medium slds-text-align_right">
            <lightning-button
                label="New Property"
                variant="brand"
                onclick={openModal}>
            </lightning-button>
        </div>

        <lightning-datatable
            key-field="Id"
            data={properties}
            columns={columns}>
        </lightning-datatable>

        <div class="slds-p-around_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
            
            <div class="slds-col">
                <p class="slds-text-body_regular">
                    Showing {startRecord} - {endRecord} of {totalRecords} records | Page {pageNumber}
                </p>
            </div>

            <div class="slds-col slds-no-flex">
                <lightning-button
                    label="Previous"
                    onclick={handlePrevious}
                    disabled={disablePrevious}>
                </lightning-button>

                <lightning-button
                    label="Next"
                    onclick={handleNext}
                    disabled={disableNext}
                    class="slds-m-left_small">
                </lightning-button>
            </div>

        </div>
<template if:true={showModal}>

<section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" onclick={handleBackdropClick}>

    <div class="slds-modal__container" onclick={handleModalClick}>

        <!-- HEADER -->
        <header class="slds-modal__header">

            <lightning-button-icon
                icon-name="utility:close"
                alternative-text="Close"
                onclick={closeModal}
                class="slds-modal__close">
            </lightning-button-icon>

            <h2 class="slds-text-heading_medium">
                New Property
            </h2>

        </header>

        <!-- BODY -->
    <div class="slds-modal__content slds-p-around_medium">

    <div class="slds-grid slds-wrap slds-gutters">

        <!-- LEFT COLUMN -->
        <div class="slds-col slds-size_1-of-2">

            <lightning-input label="Property Name"
                value={property.Name}
                required
                data-field="Name"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input label="Address"
                value={property.Address__c}
                required
                data-field="Address__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input label="City"
            required
                value={property.City__c}
                data-field="City__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input label="State"
            required
                value={property.State__c}
                data-field="State__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input label="Postal Code"
            required
                value={property.Postal_Code__c}
                data-field="Postal_Code__c"
                onchange={handleChange}>
            </lightning-input>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="slds-col slds-size_1-of-2">

            <!-- COUNTRY -->
            <lightning-input label="Country"
            required
                value={property.Country__c}
                data-field="Country__c"
                onchange={handleChange}>
            </lightning-input>

            <!-- TYPE PICKLIST -->
            <lightning-combobox
                label="Type"
                required
                value={property.Type__c}
                data-field="Type__c"
                options={typeOptions}
                onchange={handleChange}>
            </lightning-combobox>

            <!-- FURNISHING PICKLIST -->
            <lightning-combobox
                label="Furnishing Status"
                value={property.Furnishing_Status__c}
                data-field="Furnishing_Status__c"
                options={furnishingOptionsModal}
                onchange={handleChange}>
            </lightning-combobox>

            <!-- STATUS PICKLIST -->
            <lightning-combobox
                label="Availability Status"
                required
                value={property.Status__c}
                data-field="Status__c"
                options={statusOptionsModal}
                onchange={handleChange}>
            </lightning-combobox>

            <!-- RENT -->
            <lightning-input type="number"
                label="Rent"
                required
                value={property.Rent__c}
                data-field="Rent__c"
                onchange={handleChange}>
            </lightning-input>

        </div>

        <!-- FULL WIDTH DESCRIPTION -->
        <div class="slds-col slds-size_1-of-1 slds-m-top_small">

            <lightning-textarea
                label="Description"
                required
                value={property.Description__c}
                data-field="Description__c"
                onchange={handleChange}>
            </lightning-textarea>

        </div>

        <!-- IMAGE UPLOAD -->
        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">

            <lightning-file-upload
                label="Upload Property Image"
                required
                accept=".png,.jpg,.jpeg"
                onuploadfinished={handleUploadFinished}
                multiple>
            </lightning-file-upload>

            <template if:true={imageUploaded}>
                <p class="slds-text-color_success slds-m-top_small">
                    ✔ Image uploaded successfully
                </p>
            </template>

        </div>

    </div>

</div>

        <!-- FOOTER -->
        <footer class="slds-modal__footer">
            <div class="slds-text-align_right">
                <lightning-button
                    label="Create Property"
                    variant="brand"
                    onclick={handleCreate}>
                </lightning-button>

                <lightning-button
                    label="Cancel"
                    onclick={closeModal}
                    class="slds-m-left_small">
                </lightning-button>
            </div>
        </footer>

    </div>

</section>

<div class="slds-backdrop slds-backdrop_open" onclick={closeModal}></div>

</template>


   
    </lightning-card>

</template>
