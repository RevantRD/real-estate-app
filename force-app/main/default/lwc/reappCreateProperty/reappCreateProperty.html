<template>

    <lightning-card title="Create Property">

        <div class="slds-p-around_medium">

            <lightning-input
    label="Property Name"
    data-field="Name"
    onchange={handleChange}>
</lightning-input>

            <lightning-input
                label="Address"
                data-field="Address__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input
                label="City"
                data-field="City__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input
                label="State"
                data-field="State__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input
                label="Postal Code"
                data-field="Postal_Code__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input
                label="Country"
                data-field="Country__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-combobox
                label="Type"
                data-field="Type__c"
                value={propertyRecord.Type__c}
                options={typeOptions}
                onchange={handleChange}>
            </lightning-combobox>

            <lightning-combobox
                label="Furnishing Status"
                data-field="Furnishing_Status__c"
                value={propertyRecord.Furnishing_Status__c}
                options={furnishingOptions}
                onchange={handleChange}>
            </lightning-combobox>

            <lightning-combobox
                label="Status"
                data-field="Status__c"
                value={propertyRecord.Status__c}
                options={statusOptions}
                onchange={handleChange}>
            </lightning-combobox>

            <lightning-input
                type="number"
                label="Rent"
                data-field="Rent__c"
                onchange={handleChange}>
            </lightning-input>

            <lightning-textarea
                label="Description"
                data-field="Description__c"
                onchange={handleChange}>
            </lightning-textarea>

            <div class="slds-m-top_medium">

                <lightning-button
    label="Create Property"
    variant="brand"
    onclick={handleCreate}
    disabled={propertyCreated}>
</lightning-button>

            </div>

            <template if:true={showUploadWarning}>

    <div class="slds-text-color_error slds-m-top_small">

        Please upload at least one image.

    </div>

</template>

            <template if:true={propertyId}>

                <div class="slds-m-top_large">

                    <lightning-file-upload
                        label="Upload Property Images"
                        record-id={propertyId}
                        multiple
                        accept=".jpg,.jpeg,.png"
                        onuploadfinished={handleUploadFinished}>
                    </lightning-file-upload>

                </div>

            </template>

        </div>

    </lightning-card>

</template>
