<template>
    <lightning-card title="Property Location">

        <template if:true={hasLocation}>

            <lightning-map
                map-markers={mapMarkers}
                zoom-level="15">
            </lightning-map>

            <div class="slds-p-around_small">

                <p><strong>Address:</strong> {address}</p>

                <p><strong>Coordinates:</strong>
                    {latitude}, {longitude}
                </p>

            </div>

        </template>

        <template if:false={hasLocation}>
            <div class="slds-p-around_medium slds-text-color_weak">
                No location available for this property
            </div>
        </template>

    </lightning-card>
</template>
